{% extends "main/base.html" %}
{% block title %}Password updated{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <div class="display-6 mb-2">✅</div>
        <h1 class="h4 mb-2">Your password has been updated</h1>
        <p class="text-muted small mb-3">
          You can continue using your account with your new password.
        </p>
        <a class="btn btn-primary" href="{% url 'accounts:dashboard' %}">Go to dashboard</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
