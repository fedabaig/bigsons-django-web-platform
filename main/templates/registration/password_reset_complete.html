{% extends "main/base.html" %}
{% block title %}Password updated | BigSons{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h1 class="h4 mb-2">Your password has been updated</h1>
        <p class="text-muted">You can now sign in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-dark">Go to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
